<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#04070c" />
  <title>leadsfinder.ai — Sign in</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='none' stroke='%232dd4bf' stroke-width='1.6'/%3E%3Ccircle cx='8' cy='8' r='2.2' fill='%232dd4bf'/%3E%3C/svg%3E" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('lf-theme');
        if (t !== 'light' && t !== 'dark') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <script>
    (function () {
      try {
        var d = document.createElement('div');
        d.style.backdropFilter = 'url(#x)';
        var ok = (d.style.backdropFilter || '').indexOf('url') !== -1;
        var ua = navigator.userAgent;
        var isSafari = /^((?!chrome|android|crios|fxios).)*safari/i.test(ua);
        var isFirefox = /firefox|fxios/i.test(ua);
        if (ok && !isSafari && !isFirefox) document.documentElement.classList.add('has-refraction');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <svg class="lf-svg-filters" aria-hidden="true" focusable="false" width="0" height="0"
       style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none">
    <defs>
      <filter id="lf-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feImage href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNDAiIGhlaWdodD0iMjQwIj48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9InIiIHgxPSIwIiB5MT0iMCIgeDI9IjEiIHkyPSIwIj48c3RvcCBvZmZzZXQ9IjAiIHN0b3AtY29sb3I9IiMwMDAiLz48c3RvcCBvZmZzZXQ9IjEiIHN0b3AtY29sb3I9IiNmMDAiLz48L2xpbmVhckdyYWRpZW50PjxsaW5lYXJHcmFkaWVudCBpZD0iZyIgeDE9IjAiIHkxPSIwIiB4Mj0iMCIgeTI9IjEiPjxzdG9wIG9mZnNldD0iMCIgc3RvcC1jb2xvcj0iIzAwMCIvPjxzdG9wIG9mZnNldD0iMSIgc3RvcC1jb2xvcj0iIzBmMCIvPjwvbGluZWFyR3JhZGllbnQ+PC9kZWZzPjxyZWN0IHdpZHRoPSIyNDAiIGhlaWdodD0iMjQwIiBmaWxsPSJ1cmwoI3IpIi8+PHJlY3Qgd2lkdGg9IjI0MCIgaGVpZ2h0PSIyNDAiIGZpbGw9InVybCgjZykiIHN0eWxlPSJtaXgtYmxlbmQtbW9kZTpzY3JlZW4iLz48L3N2Zz4="
                 result="lfmap" x="0" y="0" width="100%" height="100%" preserveAspectRatio="none" />
        <feGaussianBlur in="lfmap" stdDeviation="0.9" result="lfmapb" />
        <feDisplacementMap in="SourceGraphic" in2="lfmapb" scale="15" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
  <div class="auth-bg" aria-hidden="true">
    <div id="auth-shader-bg" class="lf-shader-bg"></div>
    <span class="orb-a"></span>
    <span class="orb-b"></span>
  </div>

  <div class="auth-wrap">
    <form id="auth-form" class="auth-card glass glass-specular glass-refract" autocomplete="on">
      <span class="refract-edge"></span>
      <div class="auth-inner">
        <div class="auth-brand">
          <span class="mark" aria-hidden="true"></span>
          <span class="word">leadsfinder<span class="ai">.ai</span></span>
        </div>
        <p class="tagline" id="auth-tagline">Sign in to find businesses that need you</p>

        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" placeholder="at least 8 characters" />
        </div>

        <button id="auth-submit" class="auth-submit" type="submit">Sign in</button>
        <div id="auth-error" class="auth-error" hidden></div>

        <div class="auth-toggle">
          <span id="toggle-text">New here?</span>
          <button id="toggle-btn" type="button">Create an account</button>
        </div>
      </div>
    </form>
  </div>

  <script src="/liquid.js"></script>
  <script>
    (() => {
      'use strict';
      const $ = (id) => document.getElementById(id);
      let mode = 'login'; // 'login' | 'register'

      const form = $('auth-form');
      const errEl = $('auth-error');
      const submitBtn = $('auth-submit');

      function setMode(next) {
        mode = next;
        const login = mode === 'login';
        $('auth-tagline').textContent = login
          ? 'Sign in to find businesses that need you'
          : 'Create an account to start scanning';
        const submitTxt = login ? 'Sign in' : 'Create account';
        if (submitBtn._lfLiquid) submitBtn._lfLiquid.setLabel(submitTxt);
        else submitBtn.textContent = submitTxt;
        $('toggle-text').textContent = login ? 'New here?' : 'Already have an account?';
        $('toggle-btn').textContent = login ? 'Create an account' : 'Sign in';
        $('password').autocomplete = login ? 'current-password' : 'new-password';
        errEl.hidden = true;
      }

      $('toggle-btn').addEventListener('click', () => setMode(mode === 'login' ? 'register' : 'login'));

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.hidden = true;
        const email = $('email').value.trim();
        const password = $('password').value;
        if (mode === 'register' && password.length < 8) {
          errEl.textContent = 'Password must be at least 8 characters.';
          errEl.hidden = false;
          return;
        }
        submitBtn.disabled = true;
        try {
          const res = await fetch(`/api/auth/${mode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `Failed (HTTP ${res.status}).`);
          location.href = '/';
        } catch (err) {
          errEl.textContent = err.message || 'Something went wrong.';
          errEl.hidden = false;
        } finally {
          submitBtn.disabled = false;
        }
      });

      // Pointer-reactive specular on the auth card (skipped under reduced motion).
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        const card = form;
        let queued = false, px = 0, py = 0;
        const paint = () => { queued = false; card.style.setProperty('--mx', px + 'px'); card.style.setProperty('--my', py + 'px'); };
        card.addEventListener('pointermove', (e) => {
          const r = card.getBoundingClientRect();
          px = e.clientX - r.left; py = e.clientY - r.top;
          if (!queued) { queued = true; requestAnimationFrame(paint); }
        });
      }

      // Liquid-metal shader chrome (progressive enhancement; no-op without WebGL2).
      // Enhance AFTER the initial render so the submit label starts correct; from
      // here on setMode() routes through _lfLiquid.setLabel() (see above).
      if (window.LFLiquid) {
        LFLiquid.mountBackground(document.getElementById('auth-shader-bg'), {
          colors: ['#0c4a44', '#12495e', '#1b2a6b', '#050912'], speed: 0.24,
        });
        LFLiquid.enhanceButton(submitBtn, { variant: 'teal' });
      }

      // If already signed in, skip straight to the app.
      fetch('/api/auth/me').then((r) => { if (r.ok) location.href = '/'; }).catch(() => {});
    })();
  </script>
</body>
</html>

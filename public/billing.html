  <script>

        var d = document.createElement('div');
        d.style.backdropFilter = 'url(#x)';
        var ok = (d.style.backdropFilter || '').indexOf('url') !== -1;
        var ua = navigator.userAgent;
        var isSafari = /^((?!chrome|android|crios|fxios).)*safari/i.test(ua);
        var isFirefox = /firefox|fxios/i.test(ua);
        if (ok && !isSafari && !isFirefox) document.documentElement.classList.add('has-refraction');
      } catch (e) {}
    })();

  <div class="auth-bg" aria-hidden="true">
    <div id="billing-shader-bg" class="lf-shader-bg"></div>
    <span class="orb-a"></span>
    <span class="orb-b"></span>
  </div>
  <div class="auth-wrap">
    <div class="auth-card glass glass-refract">
      <span class="refract-edge"></span>
      <div class="auth-inner">
        <div class="auth-brand">
          <span class="mark" aria-hidden="true"></span>
          <span class="word">leadsfinder<span class="ai">.ai</span></span>
        </div>
        <p class="tagline" id="title">Confirming your payment…</p>
        <div id="msg" class="admin-note">Please wait while we verify your order.</div>
        <p style="margin-top:24px"><a href="/">← Back to leadsfinder.ai</a></p>
      </div>
    </div>
  </div>

  <script src="/liquid.js"></script>
  <script>
    (() => {
      'use strict';
      if (window.LFLiquid) {
        LFLiquid.mountBackground(document.getElementById('billing-shader-bg'), {
          colors: ['#0c4a44', '#12495e', '#1b2a6b', '#050912'], speed: 0.2,
        });
      }
      const params = new URLSearchParams(location.search);
      const orderId = params.get('order_id');
      const title = document.getElementById('title');
      const msg = document.getElementById('msg');

      if (!orderId) {
        title.textContent = 'Missing order';
        msg.textContent = 'No order reference was provided.';
        return;
      }

      let tries = 0;
      async function check() {
        tries++;
        try {
          const res = await fetch(`/api/billing/order/${encodeURIComponent(orderId)}`);
          if (res.status === 401) { location.href = '/login.html'; return; }
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.status === 'PAID') {
            title.textContent = 'Payment successful ✓';
            msg.textContent = 'Your plan is now active. Redirecting…';
            setTimeout(() => (location.href = '/'), 1600);
            return;
          }
          if (res.ok && (data.status === 'ACTIVE' || data.status === 'pending') && tries < 8) {
            setTimeout(check, 2000); // webhook may still be in flight
            return;
          }
          if (res.ok && data.status === 'PAID') return;
          if (tries < 8 && res.ok) { setTimeout(check, 2000); return; }
          title.textContent = 'Payment not confirmed';
          msg.textContent = data.error || `Order status: ${data.status || 'unknown'}. If you were charged, it will activate shortly.`;
        } catch (err) {
          if (tries < 8) { setTimeout(check, 2000); return; }
          title.textContent = 'Could not verify';
          msg.textContent = err.message || 'Please refresh in a moment.';
        }
      }
      check();
    })();
  </script>
